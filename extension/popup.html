<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
width: 260px; padding: 20px; background: #FAF6F1; margin: 0;
-webkit-font-smoothing: antialiased;
}
.logo { font-size: 22px; font-weight: 800; color: #C0392B; margin-bottom: 10px; }
.desc { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 18px; }
.cta {
display: block; width: 100%; padding: 12px; background: #C0392B;
color: white; border: none; border-radius: 8px; font-size: 14px;
font-weight: 700; cursor: pointer; text-align: center;
text-decoration: none; box-sizing: border-box;
}
.cta:hover { background: #A93226; }
</style>
</head>
<body>
<div class="logo">⭐ TrueStar</div>
<div class="desc">Open any restaurant on Google Maps, then tap the ⭐ button to get your personalized rating.</div>
<a class="cta" href="https://www.google.com/maps" target="_blank">Open Google Maps →</a>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 20px;
      background: #FAF6F1;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #38301f;
      margin-bottom: 10px;
    }
    .desc {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    .cta {
      display: block;
      width: 100%;
      padding: 12px;
      background: #38301f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
    }
    .cta:hover { background: #E7A545; color: #38301f; }
  </style>
</head>
<body>
  <div class="logo">&#11088; TrueStar</div>
  <div class="desc">Open any restaurant on Google Maps, then tap the &#11088; button to get your personalized rating.</div>
  <a class="cta" href="https://www.google.com/maps" target="_blank">Open Google Maps &#8594;</a>
</body>
</html>
